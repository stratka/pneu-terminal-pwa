<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#16213e">
  <title>Pneuservis - Pokladna</title>
  <link rel="manifest" href="./manifest.json">
  <link rel="stylesheet" href="./style.css">
</head>
<body>

  <!-- Header -->
  <div id="header">
    <h1>PNEUSERVIS - POKLADNA</h1>
    <span id="app-version" style="font-size:11px;color:#666;margin-right:10px;">v1.5</span>
    <span id="spz-display"></span>
    <button class="header-btn" id="btn-camera" style="background:#f39c12;" title="Vyfotit SPZ">📷</button>
    <button class="header-btn" id="btn-share-pins-main" style="background:#FF9800;" title="Sdilet pripnute dlazdice">📌</button>
    <button class="header-btn btn-blue" id="btn-update" title="Aktualizovat">🔄</button>
    <button class="header-btn btn-red" id="btn-admin">ADMINISTRACE</button>
  </div>

  <!-- Main -->
  <div id="main">
    <!-- Tiles -->
    <div id="tiles-area"></div>

    <!-- Cart -->
    <div id="cart-panel">
      <div id="cart-title">KOSIK</div>
      <div id="cart-list"></div>
      <div id="cart-buttons">
        <button class="btn-blue" id="btn-custom-item">+ Rucne</button>
        <button class="btn-red" id="btn-clear-cart">Vyprazdnit</button>
      </div>
      <div id="photo-area"></div>
      <button id="btn-finish">DOKONCIT A PLATIT | 0 Kc</button>
    </div>
  </div>

  <!-- Libs -->
  <script src="./lib/jspdf.umd.min.js"></script>
  <script src="./lib/qrcode.min.js"></script>
  <!-- App -->
  <script src="./app.js"></script>

</body>
</html>
